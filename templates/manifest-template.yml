id: project-slug
name: Project Name
repo: OWNER/REPO
version: 0.1.0
status: draft
supported_platforms:
  - darwin
  - linux
script: ../../scripts/uninstall-project-slug.sh
manual: ../../docs/removers/project-slug.md
dry_run: true
ssh_supported: true
requires_sudo: false
description: Short description of what this remover removes.
remove_list:
  - ~/.example-project
